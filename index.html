<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VEVO-EMO+ Demo</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      .wrap {
        max-width: 1480px;
        margin: 0 auto;
        padding: 0 16px 40px;
      }

      .hero {
        background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
        color: #f9fafb;
        padding: 36px 0;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
      }

      h2 {
        margin: 26px 0 12px;
        font-size: 22px;
      }

      p {
        line-height: 1.55;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 18px;
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
      }

      .meta {
        color: #4b5563;
        margin-top: 8px;
      }

      .figure {
        text-align: center;
      }

      .figure figure {
        margin: 0 auto;
        width: min(100%, 1300px);
      }

      .figure img {
        display: block;
        width: 100%;
        max-width: none;
        height: auto;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
      }

      .figure figcaption {
        margin-top: 8px;
        color: #4b5563;
        font-size: 14px;
      }

      .table-wrap {
        overflow-x: auto;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        min-width: 1060px;
      }

      th,
      td {
        border: 1px solid #e5e7eb;
        padding: 10px 12px;
        vertical-align: top;
      }

      th {
        background: #f3f4f6;
        font-weight: 700;
        position: sticky;
        top: 0;
        z-index: 2;
      }

      th:first-child {
        width: 220px;
        min-width: 220px;
        position: sticky;
        left: 0;
        background: #f9fafb;
      }

      th:first-child {
        z-index: 3;
      }

      td.direction-cell {
        width: 220px;
        min-width: 220px;
        position: sticky;
        left: 0;
        background: #f9fafb;
        z-index: 1;
      }

      col.col-direction {
        width: 220px;
      }

      col.col-audio {
        width: calc((100% - 220px) / 3);
      }

      tbody tr:nth-child(even) td {
        background: #fbfdff;
      }

      tbody tr:hover td {
        background: #f5faff;
      }

      tbody tr:nth-child(even) td.direction-cell,
      tbody tr:hover td.direction-cell {
        background: #f3f4f6;
      }

      audio {
        display: block;
        width: 100%;
        min-width: 160px;
      }

      .sample-section {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 16px;
        background: #ffffff;
      }

      .sample-section h3 {
        margin: 0 0 8px;
      }

      .sample-section p {
        margin-top: 0;
      }

      .tag {
        display: inline-block;
        margin-right: 6px;
        margin-bottom: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        background: #e5e7eb;
        font-size: 12px;
        color: #111827;
      }

      .status {
        padding: 10px 12px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .status.error {
        background: #fee2e2;
        color: #991b1b;
      }

      .small {
        font-size: 13px;
        color: #4b5563;
      }

      .direction-cell {
        vertical-align: middle;
        text-align: center;
      }

      @media (max-width: 860px) {
        .hero {
          padding: 28px 0;
        }

        h1 {
          font-size: 26px;
        }

        h2 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <div class="wrap">
        <h1 id="project-title">Demo</h1>
        <p id="project-subtitle">Any-to-any expressive voice conversion samples.</p>
      </div>
    </header>

    <main class="wrap">
      <section class="card">
        <h2>Abstract</h2>
        <p id="project-abstract">
          This page is generated from <code>samples.json</code>. Update the JSON file to edit project text and audio rows.
        </p>
        <p class="meta" id="project-links"></p>
      </section>

      <section class="card figure">
        <h2>Model Architecture</h2>
        <figure>
          <img src="./framework.svg" alt="Model architecture" />
          <figcaption id="figure-caption">Overview of the framework.</figcaption>
        </figure>
      </section>

      <section class="card">
        <h2>Speech Samples</h2>
        <p class="small" id="subset-note"></p>
        <p class="small">Tip: each direction is grouped into stacked sample rows.</p>
        <div id="load-status" class="status" hidden></div>
        <div id="sections-container"></div>
      </section>
    </main>

    <script>
      function audioCell(path) {
        if (!path) return '<span class="small">N/A</span>';
        return (
          '<audio controls preload="none">' +
          '<source src="' +
          path +
          '" type="audio/wav" />' +
          "Your browser does not support audio." +
          "</audio>"
        );
      }

      function renderSection(section) {
        const grouped = {};
        const directionOrder = [];
        (section.samples || []).forEach(function (s) {
          const key = s.direction || "Unspecified Direction";
          if (!grouped[key]) {
            grouped[key] = [];
            directionOrder.push(key);
          }
          grouped[key].push(s);
        });

        const rows = directionOrder
          .map(function (direction) {
            const samples = (grouped[direction] || []).slice(0, 2);
            while (samples.length < 2) samples.push({});
            return samples
              .map(function (s, idx) {
                const tags = (s.tags || [])
                  .map(function (t) {
                    return '<span class="tag">' + t + "</span>";
                  })
                  .join("");
                const directionCell =
                  idx === 0
                    ? "<td class=\"direction-cell\" rowspan=\"2\"><strong>" + direction + "</strong></td>"
                    : "";
                const sourceCell =
                  "<td>" +
                  audioCell(s.source) +
                  (tags || s.note
                    ? '<div class="small" style="margin-top:6px;">' +
                      (tags || "") +
                      (s.note ? '<div>' + s.note + "</div>" : "") +
                      "</div>"
                    : "") +
                  "</td>";

                return (
                  "<tr>" +
                  directionCell +
                  sourceCell +
                  "<td>" + audioCell(s.baseline) + "</td>" +
                  "<td>" + audioCell(s.proposed) + "</td>" +
                  "</tr>"
                );
              })
              .join("");
          })
          .join("");

        return (
          '<div class="sample-section">' +
          "<h3>" + (section.title || "Section") + "</h3>" +
          (section.description ? "<p>" + section.description + "</p>" : "") +
          '<div class="table-wrap">' +
          "<table>" +
          '<colgroup><col class="col-direction" /><col class="col-audio" /><col class="col-audio" /><col class="col-audio" /></colgroup>' +
          "<thead><tr>" +
          "<th>Direction</th><th>Source</th><th>VEVO-Voice</th><th>Proposed</th>" +
          "</tr></thead>" +
          "<tbody>" + rows + "</tbody>" +
          "</table>" +
          "</div>" +
          "</div>"
        );
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el && value) el.textContent = value;
      }

      function setLinks(links) {
        const el = document.getElementById("project-links");
        if (!el) return;
        if (!links || !links.length) {
          el.textContent = "";
          return;
        }
        el.innerHTML = links
          .map(function (link) {
            return '<a href="' + link.url + '" target="_blank" rel="noopener noreferrer">' + link.label + "</a>";
          })
          .join(" | ");
      }

      function showStatus(message, isError) {
        const box = document.getElementById("load-status");
        if (!box) return;
        box.hidden = false;
        box.textContent = message;
        box.className = isError ? "status error" : "status";
      }

      const samplesUrl = "./samples.json?t=" + Date.now();
      fetch(samplesUrl, { cache: "no-store" })
        .then(function (res) {
          if (!res.ok) throw new Error("Cannot load samples.json");
          return res.json();
        })
        .then(function (data) {
          setText("project-title", data.project && data.project.title);
          setText("project-subtitle", data.project && data.project.subtitle);
          setText("project-abstract", data.project && data.project.abstract);
          setText("figure-caption", data.figure_caption);
          setText("subset-note", data.subset_note);
          setLinks(data.project && data.project.links);

          const container = document.getElementById("sections-container");
          const sections = data.sections || [];
          container.innerHTML = sections.map(renderSection).join("");
          if (!sections.length) {
            showStatus("No sections found in samples.json.", true);
          }
        })
        .catch(function (err) {
          showStatus("Failed to load data: " + err.message, true);
        });
    </script>
  </body>
</html>
